tags:
  - name: Auth
    description: Ro'yxatdan o'tish, login va joriy foydalanuvchi API'lari
  - name: Products
    description: Productlarni boshqarish API'lari

paths:
  /v1/product:
    post:
      summary: Yangi product yaratish
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product yaratildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    get:
      summary: Barcha productlarni olish
      tags: [Products]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Productlar ro'yxati
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /v1/product/{id}:
    get:
      summary: ID bo'yicha bitta productni olish
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product MongoDB IDsi
          schema:
            type: string
      responses:
        "200":
          description: Product topildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product topilmadi
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      summary: Productni yangilash
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product MongoDB IDsi
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Product yangilandi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product topilmadi
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      summary: Productni o'chirish
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product MongoDB IDsi
          schema:
            type: string
      responses:
        "204":
          description: Product o'chirildi
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product topilmadi
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/register:
    post:
      summary: Yangi foydalanuvchi ro'yxatdan o'tkazish
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
      responses:
        "201":
          description: Foydalanuvchi yaratildi
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Bu email bilan foydalanuvchi allaqachon mavjud
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/login:
    post:
      summary: Tizimga kirish va JWT token olish
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        "200":
          description: Login muvaffaqiyatli bajarildi
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Bearer JWT token
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Email yoki parol noto'g'ri
        "500":
          $ref: "#/components/responses/ServerError"
  /auth/me:
    get:
      summary: Joriy foydalanuvchi ma'lumotlarini olish
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Foydalanuvchi ma'lumotlari
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      _id:
                        type: string
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                        example: user
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Bu API uchun ruxsat yo'q
        "500":
          $ref: "#/components/responses/ServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProductInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Telefon
        price:
          type: number
          example: 250
        description:
          type: string
          example: Test mahsulot
    Product:
      allOf:
        - $ref: "#/components/schemas/ProductInput"
        - type: object
          properties:
            _id:
              type: string
              example: 67f1079da3e10b14be4e6c1d
  responses:
    BadRequest:
      description: Noto'g'ri ma'lumot yuborildi
    Unauthorized:
      description: Token mavjud emas, noto'g'ri yoki yaroqsiz
    ServerError:
      description: Server xatosi
